<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Semantic Layout</title>
    <style>
        /* Basic Setup */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
        
        /* HEADER - Top area */
        header { background: #fff; padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
        header h1 { margin: 0; font-weight: 300; letter-spacing: 1px; }

        /* NAV & SECTION wrapper */
        .main-wrapper { display: flex; flex: 1; }

        /* NAV - Sidebar left */
        nav { width: 200px; background: #fafafa; padding: 20px; border-right: 1px solid #eee; }
        nav a { display: block; padding: 12px; color: #555; text-decoration: none; border-radius: 5px; margin-bottom: 5px; }
        nav a:hover { background: #f0f0f0; color: #000; }

        /* SECTION - Central area */
        section { flex: 1; padding: 25px; background: #fff; }
        
        /* ARTICLE - Inside section for the iframe */
        article { height: 400px; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ASIDE - Right sidebar (Optional info) */
        aside { width: 180px; padding: 20px; font-size: 13px; color: #777; background: #fafafa; border-left: 1px solid #eee; }

        /* FOOTER - Bottom area */
        footer { background: #333; color: #fff; text-align: center; padding: 15px; font-size: 12px; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            nav, aside { width: auto; border: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfolio Design</h1>
    </header>

    <div class="main-wrapper">
        <nav>
            <strong>MENU</strong>
            <a href="about.html" target="contentFrame">About Me</a>
            <a href="introduction.html" target="contentFrame">Intro</a>
            <a href="https://usindh.edu.pk" target="contentFrame">Uni Map</a>
        </nav>

        <section>
            <h2>Preview</h2>
            <article>
                <!-- Iframe is placed inside the article tag -->
                <iframe name="contentFrame" src="https://openstreetmap.org"></iframe>
            </article>
        </section>

        <aside>
            <h4>Quick Info</h4>
            <p>This layout uses HTML5 tags like Header, Nav, and Aside for a clean look.</p>
        </aside>
    </div>

    <footer>
        &copy; 2025 Minimalist Assignment | Created by [Your Name]
    </footer>

</body>
</html>
